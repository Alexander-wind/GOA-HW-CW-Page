<!-- დაამატე სურათი კლასით profilePic და JS-ში წამოიღე. დაუმატე სიგანე, height auto, border, border-radius და box-shadow -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <img class="profilePic" src="https://www.google.com/imgres?q=67&imgurl=https%3A%2F%2Ft4.ftcdn.net%2Fjpg%2F17%2F84%2F06%2F55%2F360_F_1784065528_QwzdqFi8YMZkNx1TfAjbxCxgtKhMikiX.jpg&imgrefurl=https%3A%2F%2Fstock.adobe.com%2Fsearch%3Fk%3D%2522number%2B67%2522&docid=2MGLbOg_yjpwqM&tbnid=S1poUCZQBY8B1M&vet=12ahUKEwjllsOJtuiTAxVaBdsEHakVJQ8QnPAOegQIEhAB..i&w=387&h=360&hcb=2&ved=2ahUKEwjllsOJtuiTAxVaBdsEHakVJQ8QnPAOegQIEhAB">

<script>
    let img = document.getElementsByClassName("profilePic")[0];

    img.style.width = "200px";
    img.style.height = "auto";
    img.style.border = "2px solid black";
    img.style.borderRadius = "50%";
    img.style.boxShadow = "0 4px 10px rgba(0,0,0,0.3)";
</script>
</body>
</html>
