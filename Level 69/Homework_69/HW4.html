<!-- შექმენი 5 li ელემენტი სიაში და JS-ში წამოიღე getElementsByTagName-ით. ყველა li-ს დაუმატე padding, margin-bottom, background-color, border-radius, list-style-type, text-transform. პირველი li-ს ტექსტის ფერი გახადე წითელი, ბოლოას მწვანე -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <ul>
    <li>Item 1</li>
    <li>Item 2</li>
    <li>Item 3</li>
    <li>Item 4</li>
    <li>Item 5</li>
</ul>

<script>
    let items = document.getElementsByTagName("li");

    for (let i = 0; i < items.length; i++) {
        items[i].style.padding = "10px";
        items[i].style.marginBottom = "10px";
        items[i].style.backgroundColor = "#eee";
        items[i].style.borderRadius = "8px";
        items[i].style.listStyleType = "none";
        items[i].style.textTransform = "uppercase";
}

 
    items[0].style.color = "red";
    items[items.length - 1].style.color = "green";
</script>
</body>
</html>
