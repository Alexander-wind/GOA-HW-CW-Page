<!-- შექმენი div ბლოკი ფიქსირებული სიგანით და ::before-ის გამოყენებით დაამატე ხაზი, რომლის სიგანე იქნება calc(100% - 40px). -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    .box {
      width: 300px;
      height: 100px;
      background: lightgray;
      position: relative;
    }

    .box::before {
      content: "";
      position: absolute;
      bottom: 10px;
      left: 20px;
      height: 3px;
      width: calc(100% - 40px);
      background: black;
    }
  </style>
</head>
<body>

  <div class="box"></div>

</body>
</html>
