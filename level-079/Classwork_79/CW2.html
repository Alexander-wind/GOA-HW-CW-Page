<!-- შექმენი p ელემენტი და ::after-ით ტექსტის ბოლოს დაამატე სიტყვა “NEW” წითელი ფერით. -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    p::after {
      content: " NEW";
      color: red;
      margin-left: 6px;
    }
  </style>
</head>
<body>

  <p>Product</p>

</body>
</html>
