<!-- ააწყეთ dark\light mode css ით როგორც გაკვეთილზე ავაწყეთ. -->

<!DOCTYPE html>
<html lang="en" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <title>Dark Mode</title>
</head>

<body class="bg-white text-black dark:bg-zinc-900 dark:text-white transition">

  <button id="toggle" class="p-2 bg-gray-300 dark:bg-gray-700">
    Toggle
  </button>

  <script>
    const btn = document.getElementById("toggle");

    btn.onclick = () => {
      document.documentElement.classList.toggle("dark");
    };
  </script>

</body>
</html>
