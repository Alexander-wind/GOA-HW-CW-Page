ვარსკვლავის ფორმის clip-path
პირობა:
შექმენით ყუთი (div) ზომით 200px x 200px. გამოიყენეთ clip-path, რომ ყუთი მიიღოს ვარსკვლავის ფორმა.

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
</head>
<body>
    <div class="w-[200px] h-[200px] bg-yellow-400"
     style="clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%)">
</div>
</body>
</html>
