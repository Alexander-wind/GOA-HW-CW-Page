<!-- შექმენი ერთი ღილაკი და ერთი ტექსტი (<p>). JavaScript-ში წამოიღე ტექსტი id-ით და პირდაპირ კოდში (click-ის გარეშე) გაუკეთე სტილები: ფერი, ფონტი და ზომა -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button>Click me</button>
<p id="myText">ეს არის ტექსტი</p>

<script>
    let myText = document.getElementById("myText");
    myText.style.color = "blue";
    myText.style.fontSize = "20px";
    myText.style.fontFamily = "Arial";
</script>
</body>
</html>
