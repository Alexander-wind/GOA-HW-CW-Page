<!-- შექმენი 3 <p> ელემენტი ერთნაირი class="text"-ით. getElementsByClassName-ით და getElementsByTagName-ით წამოიღეთ და გამოიტანეთ Console-ში. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p class="text">Paragraph 1</p>
<p class="text">Paragraph 2</p>
<p class="text">Paragraph 3</p>

<script>
    let textsByClass = document.getElementsByClassName("text");
    console.log(textsByClass);

    let textsByTag = document.getElementsByTagName("p");
    console.log(textsByTag);
</script>
</body>
</html>
