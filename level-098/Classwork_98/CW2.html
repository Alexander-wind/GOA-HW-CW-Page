<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Tailwind Modal</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex items-center justify-center h-screen bg-gray-100">

  <button id="openBtn" class="px-4 py-2 bg-blue-500 text-white rounded">
    Open Modal
  </button>

  <div id="modal" class="fixed inset-0 bg-black/50 flex items-center justify-center hidden">

    <div class="bg-white p-6 rounded shadow w-80 relative">
      
      <button id="closeBtn" class="absolute top-2 right-2 text-gray-500 hover:text-black">
        X
      </button>

      <h2 class="text-xl font-bold mb-4">Modal Title</h2>
      <p>Your info has been sent</p>

    </div>
  </div>

  <script>
    const openBtn = document.getElementById('openBtn');
    const closeBtn = document.getElementById('closeBtn');
    const modal = document.getElementById('modal');

    openBtn.onclick = () => {
      modal.classList.remove('hidden');
    };

    closeBtn.onclick = () => {
      modal.classList.add('hidden');
    };
  </script>

</body>
</html>
