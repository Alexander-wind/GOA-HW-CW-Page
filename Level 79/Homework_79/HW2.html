<!-- შექმენი სათაური (h1) და ::after-ით დაუმატე ქვედა ხაზი, რომლის სიგანე გამოითვლება calc(100% / 2). -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    h1 {
      position: relative;
      display: inline-block;
    }

    h1::after {
      content: "";
      position: absolute;
      bottom: -5px;
      left: 0;
      height: 3px;
      width: calc(100% / 2);
      background: black;
    }
  </style>
</head>
<body>

  <h1>Title</h1>

</body>
</html>
