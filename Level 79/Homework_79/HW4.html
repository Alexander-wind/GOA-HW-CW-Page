<!-- შექმენი p ელემენტი და ::after-ით დაამატე ბლოკი, რომლის მარცხენა დაშორება იქნება calc(50% - 25px). -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    p {
      position: relative;
      width: 300px;
    }

    p::after {
      content: "";
      position: absolute;
      bottom: -10px;
      left: calc(50% - 25px);
      width: 50px;
      height: 5px;
      background: red;
    }
  </style>
</head>
<body>

  <p>Some text</p>

</body>
</html>
