<!-- შექმენი ღილაკი და ::before-ით დაამატე ფონი, რომელიც ღილაკზე 10px-ით პატარაა (width: calc(100% - 20px), height: calc(100% - 20px)). -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    button {
      position: relative;
      width: 200px;
      height: 60px;
      background: transparent;
      border: 2px solid black;
      cursor: pointer;
    }

    button::before {
      content: "";
      position: absolute;
      top: 10px;
      left: 10px;
      width: calc(100% - 20px);
      height: calc(100% - 20px);
      background: lightblue;
      z-index: -1;
    }
  </style>
</head>
<body>

  <button>Click me</button>

</body>
</html>
