<!-- შექმენი ღილაკი (button) და ::before-ით დაამატე მარცხენა მხარეს პატარა ხაზი, რომელიც ღილაკის სიმაღლეს ერგება. -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    button {
      position: relative;
      padding: 10px 20px;
    }

    button::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 4px;
      height: 100%;
      background: black;
    }
  </style>
</head>
<body>

  <button>Click me</button>

</body>
</html>
