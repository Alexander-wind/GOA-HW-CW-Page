<!-- შექმენი div და გამოიყენე clip-path: polygon() რომ სამკუთხედი გახდეს. -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Level 76</title>

  <style>
    .triangle {
      width: 200px;
      height: 200px;
      background: orange;
      clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
    }
  </style>
</head>
<body>

  <div class="triangle"></div>

</body>
</html>
