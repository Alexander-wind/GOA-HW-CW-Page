<!-- შექმენი ცვლადი --btn-bg ღილაკის ფონისთვის და --btn-hover      hover ეფექტისთვის, გამოიყენე ეს ცვლადები .btn კლასზე. -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    :root {
      --btn-bg: #4caf50;
      --btn-hover: #2e7d32;
    }

    .btn {
      background: var(--btn-bg);
      color: white;
      padding: 10px 20px;
      border: none;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: var(--btn-hover);
    }
  </style>
</head>
<body>

  <button class="btn">Click me</button>

</body>
</html>
