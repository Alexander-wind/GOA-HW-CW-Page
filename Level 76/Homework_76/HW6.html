<!-- გაკეთეთ 3d Card Flip როგორი გაჩვენეტ გაკვეთილზე. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
    <style>
        .perspective { perspective: 1000px; }

        .backface-hidden { backface-visibility: hidden; }

        .transform-style-preserve-3d { transform-style: preserve-3d; }

        .rotate-y-180 { transform: rotateY(180deg); }
    </style>
</head>
<body>
    <div class="w-[200px] h-[200px] perspective">
  <div class="relative w-full h-full transition-transform duration-500 transform-style-preserve-3d hover:rotate-y-180">

    <div class="absolute w-full h-full bg-blue-500 flex items-center justify-center backface-hidden">
      Wina Mxare
    </div>

    <div class="absolute w-full h-full bg-red-500 flex items-center justify-center rotate-y-180 backface-hidden">
      Ukana Mxare
    </div>

  </div>
</div>
</body>
</html>
