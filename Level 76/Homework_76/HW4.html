<!-- შერეული – მრავალკუთხა + ცვლადი
პირობა:
შექმენით ყუთი (div) ზომით 250px x 250px.
გამოიყენეთ ცვლადი --main-color ფონისთვის
გამოიყენეთ clip-path, რომ ყუთი იყოს მრავალკუთხა (polygon) ფორმის
ცვლადის შეცვლისას ყუთის ფერი ავტომატურად შეიცვლება -->\

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
    <style>
  :root {
    --main-color: purple;
  }
</style>
</head>
<body>
    <div class="w-[250px] h-[250px]"
        style="background: var(--main-color); clip-path: polygon(50% 0%, 90% 20%, 100% 60%, 75% 100%, 25% 100%, 0% 60%, 10% 20%)">
</div>
</body>
</html>
