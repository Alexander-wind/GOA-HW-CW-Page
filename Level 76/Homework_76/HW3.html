<!-- შერეული – სამკუთხედი + ცვლადი
პირობა:
შექმენით ყუთი (div) ზომით 200px x 200px.
შექმენით ცვლადი --shape-color ფონისთვის
გამოიყენეთ clip-path, რომ ყუთი იყოს სამკუთხედი -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
    <style>
  :root {
    --shape-color: orange;
  }
</style>
</head>
<body>
    <div class="w-[200px] h-[200px]"
        style="background: var(--shape-color); clip-path: polygon(50% 0%, 0% 100%, 100% 100%)">
</div>
</body>
</html>
