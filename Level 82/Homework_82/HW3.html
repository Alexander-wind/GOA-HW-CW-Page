<!-- შექმენი ღილაკი, რომლის შიგნით არსებული ტექსტი hover-ზე მარჯვნივ გადაიწევს, ხოლო ღილაკის ფონიც შეიცვლება. -->

<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="p-10">

<button class="bg-green-500 text-white px-5 py-2 overflow-hidden transition duration-300 hover:bg-green-600 group">

    Click me
  </span>
</button>

</body>
</html>
