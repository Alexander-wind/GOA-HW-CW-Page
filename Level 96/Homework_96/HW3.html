<!-- label თავდაპირველად იყოს input-ის შიგნით (placeholder-ის მსგავსად) -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <div class="relative mb-10">
  <input 
    type="password" 
    id="password" 
    class="peer h-10 w-full border-b-2 border-gray-300 text-gray-900 placeholder-transparent focus:outline-none focus:border-indigo-600" 
    placeholder="Password" 
    minlength="8"
    required
  />
  <label 
    for="password" 
    class="absolute left-0 -top-3.5 text-gray-600 text-sm transition-all peer-placeholder-shown:text-base peer-placeholder-shown:text-gray-400 peer-placeholder-shown:top-2 peer-focus:-top-3.5 peer-focus:text-indigo-600 peer-focus:text-sm">
    პაროლი (მინ. 8 სიმბოლო)
  </label>
</div>
</body>
</html>
