<!-- ფორმა უნდა შეიცავდეს მინიმუმ 4 input-ს:
name
email
password
confirm password -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <div class="relative mb-10">
  <input 
    type="email" 
    id="email" 
    class="peer h-10 w-full border-b-2 border-gray-300 text-gray-900 placeholder-transparent focus:outline-none focus:border-indigo-600 invalid:border-red-500 invalid:text-red-600" 
    placeholder="Email Address" 
    required
  />
  <label 
    for="email" 
    class="absolute left-0 -top-3.5 text-gray-600 text-sm transition-all peer-placeholder-shown:text-base peer-placeholder-shown:text-gray-400 peer-placeholder-shown:top-2 peer-focus:-top-3.5 peer-focus:text-indigo-600 peer-focus:text-sm">
    Email მისამართი
  </label>
  <p class="mt-1 hidden peer-invalid:block text-red-500 text-xs">
    გთხოვთ შეიყვანოთ სწორი ელ-ფოსტა.
  </p>
</div>
</body>
</html>
