<!-- ღილაკი active მდგომარეობაში ოდნავ დაეშვას ქვემოთ (დაჭერის სიმულაცია). -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        button {
            background-color: midnightblue;
            transition: 1.4s;
            height: 15vh;
            width: 20vh;
            
        }
        button:active {
            background-color: sandybrown;
            transform:scale(0.92);
            top: 2vh
        }
    </style>
</head>
<body>
    <button>Click me!</button>
</body>
</html>
