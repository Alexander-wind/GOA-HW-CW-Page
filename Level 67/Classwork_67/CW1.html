<!-- შექმენი HTML-ში ერთი <h1> ელემენტი id="title"-ით. JavaScript-ში getElementById-ით წამოიღე ეს ელემენტი და გამოიყანეთ Console-ში. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 id="title">Hello DOM</h1>

<script>
    let title = document.getElementById("title");
    console.log(title);
</script>
</body>
</html>
