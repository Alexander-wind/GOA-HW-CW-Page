<!-- შექმენი სამი div grid-ით: desktop-ზე იყოს 3 სვეტი, ხოლო mobile-ზე (max-width: 768px) დარჩეს მხოლოდ 1 სვეტი. -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document</title>
<style>
    .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    }
    @media (max-width: 768px) {
    .grid {
        grid-template-columns: 1fr;
    }
    }
</style>
</head>
<body>
<div class="grid">
  <div>1</div>
  <div>2</div>
  <div>3</div>
</div>
</body>
</html>
