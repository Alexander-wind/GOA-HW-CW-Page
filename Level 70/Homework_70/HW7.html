<!-- შექმენი section, რომელსაც desktop-ზე აქვს დიდი padding (40px), ხოლო mobile-ზე (max-width: 768px) padding შემცირდეს 15px-მდე. -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document</title>
<style>
    section {
    padding: 40px;
    }
    @media (max-width: 768px) {
    section {
        padding: 15px;
    }
    }
</style>
</head>
<body>
<section>Content</section>
</body>
</html>
