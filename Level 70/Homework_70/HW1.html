<!-- შექმენი div ბარათი (card), რომელსაც desktop-ზე აქვს width 500px, ხოლო mobile-ზე (max-width: 600px) გახდეს 100% სიგანის.  -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document</title>
<style>
    .card {
    width: 500px;
    margin: auto;
    background: #ddd;
    }
    @media (max-width: 600px) {
    .card {
        width: 100%;
    }
    }
</style>
</head>
<body>
<div class="card">Card</div>
</body>
</html>
