<!-- შექმენი header, რომელსაც desktop-ზე აქვს სიმაღლე 100px, ხოლო mobile-ზე (max-width: 600px) სიმაღლე შემცირდეს 60px-მდე. -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document</title>
<style>
    header {
    height: 100px;
    background: #333;
    }
    @media (max-width: 600px) {
    header {
        height: 60px;
    }
    }
</style>
</head>
<body>
<header></header>
</body>
</html>
